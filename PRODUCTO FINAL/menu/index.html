<!doctype html>
<html lang="es">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Hospital Salud Integral</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="css/style.css">
  </head>
  <body>
    <header class="py-3 bg-white shadow-sm">
      <div class="container text-center">
        <div class="small text-muted">EJEMPLO DEL FORMULARIO</div>
        <h1 class="mb-0 title-lines">HOSPITAL SALUD INTEGRAL</h1>

        <nav class="mt-3">
          <ul class="nav justify-content-center menu-pipes">
            <li class="nav-item"><a class="nav-link active" href="#">Inicio</a></li>
            <li class="nav-item"><a class="nav-link" href="#">Pacientes</a></li>
            <li class="nav-item"><a class="nav-link" href="#">Citas</a></li>
            <li class="nav-item"><a class="nav-link" href="#">Recetas</a></li>
            <li class="nav-item"><a class="nav-link" href="#">Reportes</a></li>
            <li class="nav-item"><a class="nav-link text-danger" href="#">Salir</a></li>
          </ul>
        </nav>
      </div>
    </header>

    <main class="container my-4">
      <div class="row">
        <div class="col-12">
          <div class="card">
            <div class="card-header text-center">
              <div class="section-title">DATOS Y VARIABLES</div>
            </div>
            <div class="card-body">
              <form id="mainForm">
                <div class="row g-3">
                  <div class="col-md-4">
                    <label class="form-label">Nombre</label>
                    <input type="text" class="form-control" placeholder="Nombre del paciente">
                  </div>
                  <div class="col-md-4">
                    <label class="form-label">Documento</label>
                    <input type="text" class="form-control" placeholder="Cédula / ID">
                  </div>
                  <div class="col-md-4">
                    <label class="form-label">Fecha</label>
                    <input type="date" class="form-control">
                  </div>
                </div>

                <div class="mt-4 d-flex gap-2">
                  <button type="button" class="btn btn-success">Guardar</button>
                  <button type="button" class="btn btn-primary">Modificar</button>
                  <button type="button" class="btn btn-danger">Eliminar</button>
                  <button type="button" class="btn btn-outline-secondary ms-auto">Buscar</button>
                </div>
              </form>
            </div>
          </div>
        </div>
      </div>
    </main>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
    <script>
      document.addEventListener('click', function(e){
        if(e.target.matches('.nav-link')){
          document.querySelectorAll('.nav-link').forEach(n=>n.classList.remove('active'));
          e.target.classList.add('active');
        }
      });
    </script>
  </body>
</html>
